syntax = "proto3";

package readbench;

option cc_generic_services = true;

message ReadRequest {
  uint64 offset = 1;
  uint32 len = 2;
}

message ReadResponse {
  int32 code = 1;
  string message = 2;
  bytes body = 3;
}

service IoUringReadService {
  rpc Read(ReadRequest) returns (ReadResponse);
}

service PreadReadService {
  rpc Read(ReadRequest) returns (ReadResponse);
}
